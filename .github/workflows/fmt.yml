name: fmt

on:
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shfmt
        run: sudo apt-get install -y shfmt
      - name: Install prettier
        run: npm install -g prettier
      - name: Check formatting
        run: |
          make fmt
          git diff --exit-code
